name: Upstream Sync

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.LIDA_ACTIONS_TOKEN }}

      - name: 🔗 Add upstream remote
        run: |
          git remote add upstream https://github.com/bywatersolutions/aspen-lida.git
          git fetch upstream

      - name: 🔍 Check if upstream has main branch
        id: check_branch
        run: |
          if git ls-remote --exit-code --heads upstream main > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔄 Rebase on upstream/main
        if: steps.check_branch.outputs.exists == 'true'
        run: |
          git config --global user.email "dev@bywatersolutions.com"
          git config --global user.name "ByWater Dev Team"

          # Ensure we have everything
          git fetch origin
          git fetch upstream

          # Checkout main explicitly from origin
          git checkout -B main origin/main

          # Rebase local commits onto upstream
          git rebase upstream/main -X theirs || {
            echo "Rebase conflict detected. Aborting."
            git rebase --abort
            exit 1
          }

          # Show what changed (debug visibility)
          echo "==== Git log after rebase ===="
          git --no-pager log --oneline -n 10

          echo "==== Diff vs origin/main ===="
          git --no-pager diff origin/main || true

          # Force push because rebase rewrites history
          git push --force-with-lease origin main

      - name: ⚠️ Upstream main missing
        if: steps.check_branch.outputs.exists == 'false'
        run: |
          echo "Upstream repository does not have a main branch. Exiting gracefully."
