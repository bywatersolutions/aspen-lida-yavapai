name: Upstream Sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔗 Add upstream remote
        run: |
          git remote add upstream https://github.com/bywatersolutions/aspen-lida.git
          git fetch upstream

      - name: 🔍 Check if upstream has main branch
        id: check_branch
        run: |
          if git ls-remote --exit-code --heads upstream main > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔄 Fast-forward merge upstream/main
        if: steps.check_branch.outputs.exists == 'true'
        run: |
          git checkout main
          git merge --ff-only upstream/main
          git push origin main

      - name: ⚠️ Upstream main missing
        if: steps.check_branch.outputs.exists == 'false'
        run: |
          echo "Upstream repository does not have a main branch. Exiting gracefully."
